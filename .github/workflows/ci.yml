# CI: the same four gates a contributor runs locally, nothing more.
# fmt --check | clippy -D warnings | test --workspace | vocab-lint
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt + clippy + test + vocab-lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # rustup reads rust-toolchain.toml (1.88 + rustfmt + clippy); this
      # triggers the pinned install so every later step uses it.
      - name: Install pinned toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Vocab lint (review-safety gate)
        run: ./scripts/vocab-lint.sh

  # The static site must be hermetic: generate it for real, then prove not a
  # single external URL appears anywhere in the output. Facilities open this
  # from disk; nothing may ever try to phone out.
  web:
    name: offline site (hermetic)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          key: web
      # Output dir must NOT be "site" - that is the SvelteKit app's source
      # tree, whose configs legitimately mention https URLs in comments.
      - name: Generate the offline bundle
        run: cargo run -p thunk-cli --locked -- web --out offline-site
      - name: Hermetic check (zero external URLs)
        run: '! grep -rE "https?://" offline-site/'

  # The two build profiles must stay separated: the inside (default) graph
  # carries no hardware crate at all, and the open profile builds, lints, and
  # passes its tests here. (The inside profile's build/tests/lint live in the
  # check job; its deployment artifact in static-musl.)
  profiles:
    name: inside/open profiles
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          key: profiles
      - name: Profile audit (graph separation)
        run: CARGO_NET_OFFLINE=false ./scripts/profile-audit.sh
      - name: Build the open profile
        run: cargo build -p thunk-cli --features open --locked
      - name: Clippy the open profile
        run: |
          cargo clippy -p thunk-cli --features open --all-targets --locked -- -D warnings
          cargo clippy -p thunk-content --features open --all-targets --locked -- -D warnings
      - name: Test the open content
        run: cargo test -p thunk-content --features open --locked
      - name: Test the open CLI
        run: cargo test -p thunk-cli --features open --locked

  # The inside build must always compile as a fully static binary with no
  # host-linked surprises. This is the deployment artifact for facilities.
  static-musl:
    name: static musl build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned toolchain + musl target
        run: |
          rustup show
          rustup target add x86_64-unknown-linux-musl
      - name: Install musl-gcc
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl
      - name: Build release (static)
        run: cargo build --release -p thunk-cli --target x86_64-unknown-linux-musl --locked
      # musl output is static-PIE on modern toolchains; `file` reports it as
      # "static-pie linked". Both spellings mean no dynamic dependencies.
      - name: Verify the binary is static
        run: |
          file target/x86_64-unknown-linux-musl/release/thunk | tee /dev/stderr | grep -Eq 'statically linked|static-pie linked'

  # The no-hardware proof, end to end: boot a real kernel in QEMU (TCG, no
  # KVM) where the static thunk binary is the only userspace, and assert the
  # course's bus trace comes back over the serial console. See docs/PATHS.md.
  qemu:
    name: qemu boot smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned toolchain + musl target
        run: |
          rustup show
          rustup target add x86_64-unknown-linux-musl
      - name: Install qemu, busybox, musl-gcc
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 busybox-static musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: qemu
      # The runner's kernel is root-readable only; stage a readable copy.
      - name: Stage a readable kernel
        run: sudo install -m 0644 "/boot/vmlinuz-$(uname -r)" /tmp/vmlinuz
      - name: Boot smoke
        run: THUNK_QEMU_KERNEL=/tmp/vmlinuz ./scripts/qemu-smoke.sh

  # The public course site (SvelteKit, adapter-static). Two guarantees: the
  # checked-in content.json is exactly what `thunk export` emits (it can never
  # drift from the curriculum), and the built site is hermetic - no external
  # resource ever loads. The markup and styles carry zero external URLs; the
  # only https strings in the JS runtime are Svelte's inert error-doc links and
  # W3C XML namespaces, never fetched.
  site:
    name: course site (static + hermetic)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned toolchain + wasm target
        # The bench crate (site/wasm) compiles to wasm32; the build's prebuild
        # step drives wasm-pack (installed as a site devDependency, so npm ci
        # brings it - no separate slow `cargo install`).
        run: |
          rustup show
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: site
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      # The public SPA is the internet, so it goes all the way to M7 (First
      # Patch): export WITH the open feature. The offline `web` bundle above stays
      # default (M0-M6) - only the site content carries the eighth module.
      - name: Export the curriculum (open profile - includes M7)
        run: cargo run -p thunk-cli --locked --features open -- export
      - name: Content is fresh (regenerated JSON matches the checked-in copy)
        run: git diff --exit-code site/src/lib/content.json
      # The bench crate is excluded from the workspace, so `cargo test --workspace`
      # in the check job never runs its native tests. Run them here on the host
      # target (no wasm toolchain needed) so the RGB565 downscale / letterbox /
      # trace-encoding logic behind the live bench is actually covered.
      - name: Test the bench crate (native)
        # --lib: the crate is cdylib+rlib; the unit tests live in the lib target.
        run: cargo test --manifest-path site/wasm/Cargo.toml --lib --locked
      - name: Install site deps
        run: npm ci --prefix site
      - name: Unit tests (grader parity + XP curve)
        run: npm test --prefix site
      - name: Build the static site
        run: npm run build --prefix site
      - name: Perf budget (first-route JS < 100KB gzipped; wasm lazy, excluded)
        run: node site/scripts/perf-budget.mjs
      - name: Hermetic check (no external URLs in markup or styles)
        # Allowlist the site's own canonical origin PLUS the launchpad's curated
        # out-link destinations. https://thunk.goolz.org appears only in
        # <link rel="canonical">, og:url, and og:image meta - the site's own
        # address, never FETCHED. The out-link hosts (github.com, kernelnewbies.org,
        # outreachy.org, linuxfoundation.org) appear ONLY as <a target=_blank
        # rel=noopener> hrefs on /first-patch: on-ramps a human CLICKS to go find a
        # first issue. They are never fetched by the site - the air-gap principle is
        # "never phone home", and an anchor the reader clicks is not that. Anything
        # else must be zero, so the grep stays meaningful.
        run: |
          bad=$(grep -rhoE "https?://[A-Za-z0-9._~:/?#@!%-]+" site/build --include="*.html" --include="*.css" \
            | grep -vE "^https://([a-z0-9-]+\.)*(thunk\.goolz\.org|github\.com|kernelnewbies\.org|outreachy\.org|linuxfoundation\.org)(/|\$)" || true)
          test -z "$bad" || { echo "unexpected external URLs in markup/styles:"; echo "$bad"; exit 1; }
      - name: Hermetic check (JS carries no phone-home URLs beyond framework internals)
        # Same allowlist: the Meta component carries https://thunk.goolz.org into the
        # hydration bundle (metadata), and the /first-patch component compiles the
        # curated out-link hrefs into its lazy chunk (anchors a human clicks, never
        # fetched). Everything else - any real phone-home URL - still fails.
        run: |
          bad=$(grep -rhoE "https?://[A-Za-z0-9._~:/?#@!%-]+" site/build --include='*.js' \
            | grep -vE "w3\.org|svelte\.dev/e/|thunk\.goolz\.org|github\.com|kernelnewbies\.org|outreachy\.org|linuxfoundation\.org" || true)
          test -z "$bad" || { echo "unexpected external URLs in JS:"; echo "$bad"; exit 1; }

  # End-to-end: drive the built site in a real chromium exactly as a reader would
  # - every route, the grade/XP loop, full module mastery, the calibration test-
  # out, the WASM bench (POWER/STEP/RUN/SAVE TRACE + the DOOM source switch), the
  # progress export/import round-trip, and an axe pass. Playwright's webServer
  # runs `npm run build && vite preview`; the build's prebuild drives wasm-pack
  # (a site devDependency), so the bench crate needs the wasm32 target here too.
  # DOOM's full title-paint (10MB WAD + doomgeneric wasm) is skipped under CI as
  # slow/flaky - the source switch + WAD fetch are still asserted; the paint runs
  # locally. @playwright/test is dev-only: it never ships, so the perf budget and
  # the hermetic checks (both in the `site` job) are unaffected.
  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned toolchain + wasm target
        run: |
          rustup show
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site deps
        run: npm ci --prefix site
      # The bundled chromium is pinned by the exact @playwright/test version
      # (revision 1228); --with-deps also installs the runner's system libraries.
      - name: Install Playwright chromium (+ system deps)
        run: npx playwright install --with-deps chromium
        working-directory: site
      - name: End-to-end tests (build + preview + drive)
        run: npm run test:e2e --prefix site
      - name: Upload the Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: site/playwright-report/
          retention-days: 7
