<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="dark" />
		<meta name="theme-color" content="#0A0E13" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<!-- The two critical faces: body regular + mono regular. Self-hosted,
		     no CDN. Everything else loads with font-display: swap. -->
		<link
			rel="preload"
			as="font"
			type="font/woff2"
			href="%sveltekit.assets%/fonts/switzer-variable.woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			as="font"
			type="font/woff2"
			href="%sveltekit.assets%/fonts/commit-mono-400.woff2"
			crossorigin="anonymous"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
